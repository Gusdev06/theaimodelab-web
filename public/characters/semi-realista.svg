<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0077b6"/>
      <stop offset="50%" style="stop-color:#0096c7"/>
      <stop offset="100%" style="stop-color:#00b4d8"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="35%" r="50%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.15)"/>
      <stop offset="100%" style="stop-color:rgba(255,255,255,0)"/>
    </radialGradient>
  </defs>
  <rect width="400" height="400" rx="24" fill="url(#bg)"/>
  <rect width="400" height="400" rx="24" fill="url(#glow)"/>
  <!-- Half realistic / half stylized face -->
  <!-- Face outline -->
  <ellipse cx="200" cy="170" rx="65" ry="80" fill="rgba(255,255,255,0.2)"/>
  <!-- Divider line down the middle -->
  <line x1="200" y1="90" x2="200" y2="250" stroke="rgba(255,255,255,0.4)" stroke-width="2" stroke-dasharray="6,4"/>
  <!-- Left side - more detailed -->
  <ellipse cx="175" cy="155" rx="12" ry="8" fill="rgba(255,255,255,0.35)"/>
  <circle cx="175" cy="155" r="5" fill="rgba(0,0,0,0.3)"/>
  <path d="M165 195 Q175 205 190 195" stroke="rgba(255,255,255,0.3)" stroke-width="2" fill="none"/>
  <line x1="160" y1="140" x2="190" y2="138" stroke="rgba(255,255,255,0.25)" stroke-width="2"/>
  <!-- Right side - simpler -->
  <ellipse cx="225" cy="155" rx="14" ry="10" fill="rgba(255,255,255,0.35)"/>
  <circle cx="225" cy="155" r="7" fill="rgba(0,0,0,0.3)"/>
  <path d="M210 195 Q225 208 240 195" stroke="rgba(255,255,255,0.3)" stroke-width="2.5" fill="none"/>
  <!-- Brush stroke effect -->
  <path d="M280 120 Q310 150 290 200 Q270 250 300 280" stroke="rgba(255,255,255,0.1)" stroke-width="20" fill="none" stroke-linecap="round"/>
  <!-- Label -->
  <rect x="0" y="340" width="400" height="60" fill="rgba(0,0,0,0.45)"/>
  <text x="200" y="378" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700" fill="white" letter-spacing="1">Semi-realista</text>
</svg>