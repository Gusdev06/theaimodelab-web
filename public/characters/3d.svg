<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00b4d8"/>
      <stop offset="50%" style="stop-color:#0077b6"/>
      <stop offset="100%" style="stop-color:#023e8a"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="40%" r="50%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.15)"/>
      <stop offset="100%" style="stop-color:rgba(255,255,255,0)"/>
    </radialGradient>
    <linearGradient id="cube1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.35)"/>
      <stop offset="100%" style="stop-color:rgba(255,255,255,0.1)"/>
    </linearGradient>
  </defs>
  <rect width="400" height="400" rx="24" fill="url(#bg)"/>
  <rect width="400" height="400" rx="24" fill="url(#glow)"/>
  <!-- 3D Cube -->
  <!-- Front face -->
  <polygon points="155,145 245,145 245,235 155,235" fill="rgba(255,255,255,0.25)" stroke="rgba(255,255,255,0.4)" stroke-width="2"/>
  <!-- Top face -->
  <polygon points="155,145 195,110 285,110 245,145" fill="rgba(255,255,255,0.35)" stroke="rgba(255,255,255,0.4)" stroke-width="2"/>
  <!-- Right face -->
  <polygon points="245,145 285,110 285,200 245,235" fill="rgba(255,255,255,0.15)" stroke="rgba(255,255,255,0.4)" stroke-width="2"/>
  <!-- Sphere behind -->
  <circle cx="200" cy="190" r="30" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="2"/>
  <ellipse cx="200" cy="190" rx="30" ry="10" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1.5"/>
  <ellipse cx="200" cy="190" rx="10" ry="30" fill="none" stroke="rgba(255,255,255,0.15)" stroke-width="1.5"/>
  <!-- Floating particles -->
  <circle cx="120" cy="120" r="4" fill="rgba(255,255,255,0.3)"/>
  <circle cx="300" cy="260" r="3" fill="rgba(255,255,255,0.25)"/>
  <circle cx="130" cy="270" r="5" fill="rgba(255,255,255,0.2)"/>
  <circle cx="280" cy="130" r="3.5" fill="rgba(255,255,255,0.28)"/>
  <!-- Label -->
  <rect x="0" y="340" width="400" height="60" fill="rgba(0,0,0,0.45)"/>
  <text x="200" y="378" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="700" fill="white" letter-spacing="1">3D Render</text>
</svg>