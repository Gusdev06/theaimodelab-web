      <stop offset="0%" style="stop-color:#e8a87c"/>
      <stop offset="50%" style="stop-color:#d4845a"/>
      <stop offset="100%" style="stop-color:#b5651d"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="40%" r="50%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.15)"/>
      <stop offset="100%" style="stop-color:rgba(255,255,255,0)"/>
    </radialGradient>
  </defs>
  <rect width="400" height="400" rx="24" fill="url(#bg)"/>
  <rect width="400" height="400" rx="24" fill="url(#glow)"/>
  <!-- Human silhouette -->
  <circle cx="200" cy="130" r="50" fill="rgba(255,255,255,0.25)"/>
  <ellipse cx="200" cy="260" rx="70" ry="85" fill="rgba(255,255,255,0.25)"/>
  <!-- Shoulders -->
  <path d="M130 245 Q130 210 160 200 L240 200 Q270 210 270 245" fill="rgba(255,255,255,0.2)"/>
