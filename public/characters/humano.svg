  <rect x="0" y="340" width="400" height="60" rx="0" fill="rgba(0,0,0,0.45)"/>
  <text x="200" y="378" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="700" fill="white" letter-spacing="1">Humano</text>
</svg>