<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2d6a4f"/>
      <stop offset="50%" style="stop-color:#52b788"/>
      <stop offset="100%" style="stop-color:#b7e4c7"/>
    </linearGradient>
  </defs>
  <rect width="400" height="400" rx="24" fill="url(#bg)"/>
  <!-- Pixel grid overlay -->
  <g opacity="0.06">
    <line x1="0" y1="20" x2="400" y2="20" stroke="white" stroke-width="1"/>
    <line x1="0" y1="40" x2="400" y2="40" stroke="white" stroke-width="1"/>
    <line x1="0" y1="60" x2="400" y2="60" stroke="white" stroke-width="1"/>
    <line x1="0" y1="80" x2="400" y2="80" stroke="white" stroke-width="1"/>
    <line x1="20" y1="0" x2="20" y2="400" stroke="white" stroke-width="1"/>
    <line x1="40" y1="0" x2="40" y2="400" stroke="white" stroke-width="1"/>
    <line x1="60" y1="0" x2="60" y2="400" stroke="white" stroke-width="1"/>
    <line x1="80" y1="0" x2="80" y2="400" stroke="white" stroke-width="1"/>
  </g>
  <!-- Pixel art character (20px grid) -->
  <!-- Hair row 1 -->
  <rect x="160" y="80" width="20" height="20" fill="rgba(255,255,255,0.3)"/>
  <rect x="180" y="80" width="20" height="20" fill="rgba(255,255,255,0.3)"/>
  <rect x="200" y="80" width="20" height="20" fill="rgba(255,255,255,0.3)"/>
  <rect x="220" y="80" width="20" height="20" fill="rgba(255,255,255,0.3)"/>
  <!-- Hair row 2 -->
  <rect x="140" y="100" width="20" height="20" fill="rgba(255,255,255,0.3)"/>
  <rect x="160" y="100" width="20" height="20" fill="rgba(255,255,255,0.3)"/>
  <rect x="180" y="100" width="20" height="20" fill="rgba(255,255,255,0.3)"/>
  <rect x="200" y="100" width="20" height="20" fill="rgba(255,255,255,0.3)"/>
  <rect x="220" y="100" width="20" height="20" fill="rgba(255,255,255,0.3)"/>
  <rect x="240" y="100" width="20" height="20" fill="rgba(255,255,255,0.3)"/>
  <!-- Face row 1 -->
  <rect x="140" y="120" width="20" height="20" fill="rgba(255,255,255,0.2)"/>
  <rect x="160" y="120" width="20" height="20" fill="rgba(255,255,255,0.2)"/>
  <rect x="180" y="120" width="20" height="20" fill="rgba(255,255,255,0.2)"/>
  <rect x="200" y="120" width="20" height="20" fill="rgba(255,255,255,0.2)"/>
  <rect x="220" y="120" width="20" height="20" fill="rgba(255,255,255,0.2)"/>
  <rect x="240" y="120" width="20" height="20" fill="rgba(255,255,255,0.2)"/>
  <!-- Eyes row -->
  <rect x="140" y="140" width="20" height="20" fill="rgba(255,255,255,0.2)"/>
  <rect x="160" y="140" width="20" height="20" fill="rgba(0,0,0,0.35)"/>
  <rect x="180" y="140" width="20" height="20" fill="rgba(255,255,255,0.2)"/>
  <rect x="200" y="140" width="20" height="20" fill="rgba(255,255,255,0.2)"/>
  <rect x="220" y="140" width="20" height="20" fill="rgba(0,0,0,0.35)"/>
  <rect x="240" y="140" width="20" height="20" fill="rgba(255,255,255,0.2)"/>
  <!-- Mouth row -->
  <rect x="140" y="160" width="20" height="20" fill="rgba(255,255,255,0.2)"/>
  <rect x="160" y="160" width="20" height="20" fill="rgba(255,255,255,0.2)"/>
  <rect x="180" y="160" width="20" height="20" fill="rgba(0,0,0,0.2)"/>
  <rect x="200" y="160" width="20" height="20" fill="rgba(0,0,0,0.2)"/>
  <rect x="220" y="160" width="20" height="20" fill="rgba(255,255,255,0.2)"/>
  <rect x="240" y="160" width="20" height="20" fill="rgba(255,255,255,0.2)"/>
  <!-- Chin -->
  <rect x="160" y="180" width="20" height="20" fill="rgba(255,255,255,0.2)"/>
  <rect x="180" y="180" width="20" height="20" fill="rgba(255,255,255,0.2)"/>
  <rect x="200" y="180" width="20" height="20" fill="rgba(255,255,255,0.2)"/>
  <rect x="220" y="180" width="20" height="20" fill="rgba(255,255,255,0.2)"/>
  <!-- Body -->
  <rect x="160" y="200" width="20" height="20" fill="rgba(255,255,255,0.15)"/>
  <rect x="180" y="200" width="20" height="20" fill="rgba(255,255,255,0.15)"/>
  <rect x="200" y="200" width="20" height="20" fill="rgba(255,255,255,0.15)"/>
  <rect x="220" y="200" width="20" height="20" fill="rgba(255,255,255,0.15)"/>
  <rect x="140" y="220" width="20" height="20" fill="rgba(255,255,255,0.15)"/>
  <rect x="160" y="220" width="20" height="20" fill="rgba(255,255,255,0.15)"/>
  <rect x="180" y="220" width="20" height="20" fill="rgba(255,255,255,0.15)"/>
  <rect x="200" y="220" width="20" height="20" fill="rgba(255,255,255,0.15)"/>
  <rect x="220" y="220" width="20" height="20" fill="rgba(255,255,255,0.15)"/>
  <rect x="240" y="220" width="20" height="20" fill="rgba(255,255,255,0.15)"/>
  <!-- Legs -->
  <rect x="160" y="240" width="20" height="20" fill="rgba(255,255,255,0.12)"/>
  <rect x="180" y="240" width="20" height="20" fill="rgba(255,255,255,0.12)"/>
  <rect x="200" y="240" width="20" height="20" fill="rgba(255,255,255,0.12)"/>
  <rect x="220" y="240" width="20" height="20" fill="rgba(255,255,255,0.12)"/>
  <rect x="160" y="260" width="20" height="20" fill="rgba(255,255,255,0.12)"/>
  <rect x="180" y="260" width="20" height="20" fill="rgba(255,255,255,0.12)"/>
  <rect x="200" y="260" width="20" height="20" fill="rgba(255,255,255,0.12)"/>
  <rect x="220" y="260" width="20" height="20" fill="rgba(255,255,255,0.12)"/>
  <!-- Label -->
  <rect x="0" y="340" width="400" height="60" fill="rgba(0,0,0,0.45)"/>
  <text x="200" y="378" text-anchor="middle" font-family="'Courier New', monospace" font-size="22" font-weight="700" fill="white" letter-spacing="2">Pixel Art</text>
</svg>