<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff8c00"/>
      <stop offset="50%" style="stop-color:#ffa726"/>
      <stop offset="100%" style="stop-color:#ffd54f"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="40%" r="50%">
      <stop offset="0%" style="stop-color:rgba(255,255,255,0.15)"/>
      <stop offset="100%" style="stop-color:rgba(255,255,255,0)"/>
    </radialGradient>
  </defs>
  <rect width="400" height="400" rx="24" fill="url(#bg)"/>
  <rect width="400" height="400" rx="24" fill="url(#glow)"/>
  <!-- Cartoon face - big round head -->
  <circle cx="200" cy="175" r="90" fill="rgba(255,255,255,0.25)"/>
  <!-- Big cartoon eyes -->
  <ellipse cx="165" cy="160" rx="22" ry="26" fill="white" opacity="0.5"/>
  <circle cx="170" cy="158" r="12" fill="rgba(0,0,0,0.4)"/>
  <circle cx="166" cy="152" r="5" fill="rgba(255,255,255,0.6)"/>
  <ellipse cx="235" cy="160" rx="22" ry="26" fill="white" opacity="0.5"/>
  <circle cx="230" cy="158" r="12" fill="rgba(0,0,0,0.4)"/>
  <circle cx="226" cy="152" r="5" fill="rgba(255,255,255,0.6)"/>
  <!-- Big smile -->
  <path d="M160 200 Q200 240 240 200" stroke="rgba(0,0,0,0.3)" stroke-width="4" fill="none" stroke-linecap="round"/>
  <!-- Rosy cheeks -->
  <circle cx="140" cy="195" r="15" fill="rgba(255,100,100,0.2)"/>
  <circle cx="260" cy="195" r="15" fill="rgba(255,100,100,0.2)"/>
  <!-- Simple body -->
  <path d="M155 260 Q155 290 200 300 Q245 290 245 260" fill="rgba(255,255,255,0.15)"/>
  <!-- Label -->
  <rect x="0" y="340" width="400" height="60" fill="rgba(0,0,0,0.45)"/>
  <text x="200" y="378" text-anchor="middle" font-family="system-ui, -apple-system, sans-serif" font-size="22" font-weight="700" fill="white" letter-spacing="1">Cartoon</text>
</svg>