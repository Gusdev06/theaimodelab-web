<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 252 168" width="756" height="504">
  <defs>
    
    <linearGradient id="base" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1a2123"></stop>
      <stop offset="1" stop-color="#11161a"></stop>
    </linearGradient>
    
    <radialGradient id="b1" cx="50%" cy="50%" r="50%"><stop offset="0" stop-color="#f5409d" stop-opacity="1"></stop><stop offset="100%" stop-color="#f5409d" stop-opacity="0"></stop></radialGradient>
    <radialGradient id="b2" cx="50%" cy="50%" r="50%"><stop offset="0" stop-color="#4b1e3a" stop-opacity="1"></stop><stop offset="100%" stop-color="#4b1e3a" stop-opacity="0"></stop></radialGradient>
    <radialGradient id="b3" cx="50%" cy="50%" r="50%"><stop offset="0" stop-color="#2f9c8b" stop-opacity="1"></stop><stop offset="100%" stop-color="#2f9c8b" stop-opacity="0"></stop></radialGradient>
    <radialGradient id="b4" cx="50%" cy="50%" r="50%"><stop offset="0" stop-color="#ff85c2" stop-opacity="1"></stop><stop offset="100%" stop-color="#ff85c2" stop-opacity="0"></stop></radialGradient>
    
    <linearGradient id="p1" x1="0" y1="0" x2="1" y2="1"><stop offset="0.1" stop-color="#4b1e3a"></stop><stop offset="0.95" stop-color="#f5409d"></stop></linearGradient>
    <linearGradient id="p2" x1="0" y1="0" x2="1" y2="1"><stop offset="0.1" stop-color="#243032"></stop><stop offset="0.95" stop-color="#2f9c8b"></stop></linearGradient>
    <radialGradient id="hero" cx="50%" cy="20%" r="120%"><stop offset="0" stop-color="#e7f6c4"></stop><stop offset="0.45" stop-color="#f5409d"></stop><stop offset="1" stop-color="#4b1e3a"></stop></radialGradient>

    <filter id="blur" x="-30%" y="-30%" width="160%" height="160%"><feGaussianBlur stdDeviation="14"></feGaussianBlur></filter>
    <filter id="shadow" x="-40%" y="-40%" width="180%" height="180%"><feDropShadow dx="0" dy="5" stdDeviation="5" flood-color="#000" flood-opacity="0.32"></feDropShadow></filter>
  </defs>

  
  <rect width="252" height="168" fill="url(#base)"></rect>

  
  <g filter="url(#blur)">
    <ellipse cx="55" cy="54" rx="80" ry="70" fill="url(#b1)"></ellipse>
    <ellipse cx="186" cy="34" rx="74" ry="58" fill="url(#b2)"></ellipse>
    <ellipse cx="207" cy="124" rx="86" ry="64" fill="url(#b3)"></ellipse>
    <ellipse cx="76" cy="141" rx="80" ry="60" fill="url(#b3)"></ellipse>
    <ellipse cx="141" cy="84" rx="62" ry="50" fill="url(#b4)"></ellipse>
  </g>

  
  <g filter="url(#shadow)">
    
    <rect x="18" y="96" width="50" height="56" rx="7" fill="url(#p1)" stroke="#ffffff" stroke-opacity="0.5" stroke-width="2"></rect>
    <rect x="170" y="16" width="52" height="60" rx="7" fill="url(#p2)" stroke="#ffffff" stroke-opacity="0.5" stroke-width="2"></rect>
    
    <rect x="78" y="64" width="78" height="48" rx="8" fill="url(#hero)" stroke="#ffffff" stroke-opacity="0.6" stroke-width="2"></rect>

    
    <g>
