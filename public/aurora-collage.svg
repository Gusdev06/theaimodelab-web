      <g fill="#282a2e" fill-opacity="0.32">
        <rect x="24" y="28" width="40" height="3" rx="1.5"></rect>
        <rect x="24" y="35" width="46" height="3" rx="1.5"></rect>
        <rect x="24" y="42" width="34" height="3" rx="1.5"></rect>
        <rect x="24" y="49" width="44" height="3" rx="1.5"></rect>
        <rect x="24" y="56" width="24" height="3" rx="1.5"></rect>
      </g>
    </g>

    
    <g>
      <rect x="204" y="70" width="34" height="38" rx="5" fill="#ffffff" fill-opacity="0.92"></rect>
      <g fill="#282a2e" fill-opacity="0.32">
        <rect x="210" y="78" width="22" height="3" rx="1.5"></rect>
        <rect x="210" y="85" width="18" height="3" rx="1.5"></rect>
        <rect x="210" y="92" width="20" height="3" rx="1.5"></rect>
